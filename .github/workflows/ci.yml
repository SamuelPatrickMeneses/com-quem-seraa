name: CI

on:
  push:
    branches: [main, develop, testing]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose --profile test up --abort-on-container-exit --exit-code-from test
