services:

  build:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    profiles:
      - dev
      - prod
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/dist/frontend/browser:/app/apps/web/dist/frontend/browser
    environment:
      - APP_ENV=${APP_ENV:-prod}
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/apps/web/dist/frontend/browser/index.html"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  test:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: test
    profiles:
      - test
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      - APP_ENV=dev
      - SELENIUM_HOST=selenium-firefox
      - SELENIUM_PORT=4444
      - KARMA_HOSTNAME=test
      - KARMA_BROWSER=SeleniumFirefox
    depends_on:
      selenium-firefox:
        condition: service_started
      pocketbase:
        condition: service_started
    networks:
      - amigo-secreto-network

  selenium-firefox:
    image: selenium/standalone-firefox:latest
    container_name: selenium-firefox
    profiles:
      - test
    shm_size: 2gb
    restart: unless-stopped
    environment:
      - SE_NODE_MAX_SESSIONS=5
    networks:
      - amigo-secreto-network

  pocketbase:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: pocketbase
    restart: unless-stopped
    profiles:
      - dev
      - prod
      - test
    volumes:
      - pocketbase_data:/app/pb_data
      - ./db/pb_public:/app/pb_public
      - ./db/pb_hooks:/app/pb_hooks
      - ./db/pb_migrations:/app/pb_migrations
    env_file:
      - .env
    networks:
      - amigo-secreto-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    profiles:
      - dev
      - prod
    ports:
      - "80:80"
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - NGINX_ENVSUBST_FILTER=APP_ENV
      - DOCKER_BUILD_CONDITION=${DOCKER_BUILD_CONDITION:-service_completed_successfully}
    env_file:
      - .env
    volumes:
      - ./apps/web/dist/frontend/browser:/usr/share/nginx/html:ro
      - ./server/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./server/logs:/var/log/nginx
    depends_on:
      pocketbase:
        condition: service_started
      build:
        condition: $DOCKER_BUILD_CONDITION
    networks:
      - amigo-secreto-network

networks:
  amigo-secreto-network:
    driver: bridge
volumes:
  pocketbase_data:
