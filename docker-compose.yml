services:
  pocketbase:
    image: alpine:latest
    container_name: pocketbase
    restart: unless-stopped
    command: ["/pb/pocketbase", "serve", "--http=0.0.0.0:8090"]
    volumes:
      - ./db/pb_data:/pb/pb_data
      - ./db/pb_public:/pb/pb_public
      - ./db/pb_hooks:/pb/pb_hooks
      - ./db/pb_migrations:/pb/pb_migrations
    environment:
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD}
    networks:
      - amigo-secreto-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./apps/web/dist/frontend/browser:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./server/logs:/var/log/nginx
    depends_on:
      - pocketbase
    networks:
      - amigo-secreto-network

networks:
  amigo-secreto-network:
    driver: bridge
