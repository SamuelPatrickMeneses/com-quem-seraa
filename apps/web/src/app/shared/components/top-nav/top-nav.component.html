<header class="bg-white border-b border-stone-100 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/my-groups" class="flex items-center gap-2 select-none">
      <div class="w-7 h-7 bg-[#c0392b] rounded-lg flex items-center justify-center">
        <lucide-icon [img]="GiftIcon" [size]="14" class="text-white"></lucide-icon>
      </div>
      <span class="font-extrabold text-stone-900 text-base leading-none">Secret Santa</span>
    </a>

    <!-- Desktop nav links -->
    <nav class="hidden md:flex items-center gap-6">
      <a routerLink="/my-groups" routerLinkActive="text-stone-900 font-semibold"
         class="text-sm text-stone-400 hover:text-stone-700 transition-colors font-medium">
        Events
      </a>
      <a routerLink="/create" routerLinkActive="text-stone-900 font-semibold"
         class="text-sm text-stone-400 hover:text-stone-700 transition-colors font-medium">
        Create
      </a>
      <a routerLink="/profile" routerLinkActive="!text-[#c0392b]"
         class="text-sm text-stone-400 hover:text-stone-700 transition-colors font-semibold">
        Profile
      </a>
    </nav>

    <!-- Bell icon -->
    <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-stone-100 transition-colors text-stone-500">
      <lucide-icon [img]="BellIcon" [size]="20"></lucide-icon>
    </button>
  </div>
</header>
